<style>
.niche-tag{border:1px solid rgba(244,241,237,0.12);padding:10px 20px;border-radius:100px;font-size:13px;color:rgba(244,241,237,0.5);transition:all 0.2s;cursor:default}
.niche-tag:hover{border-color:var(--accent);color:var(--accent);background:rgba(232,255,71,0.04)}
.niche-tag.active{border-color:var(--accent);color:var(--accent);background:rgba(232,255,71,0.06)}
</style>

<div id="footer-placeholder"></div>
<script src="js/layout.js"></script>
<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const niches_en = ['Real Estate','E-Commerce','Healthcare','Legal','Financial Services','Hospitality','SaaS & Tech','Logistics','Education','Retail','Insurance','Recruitment','Construction','Automotive','Marketing Agencies'];
  const niches_ru = ['Недвижимость','E-Commerce','Медицина','Юриспруденция','Финансы','Гостиницы','SaaS','Логистика','Образование','Ритейл','Страхование','Рекрутинг','Строительство','Авто','Маркетинг'];
  function renderNiches() {
    const l = localStorage.getItem('operix_lang') || 'en';
    const list = l === 'ru' ? niches_ru : niches_en;
    const el = document.getElementById('niches');
    if (!el) return;
    el.innerHTML = list.map((n,i) => `<span class="niche-tag${i===0?' active':''}">${n}</span>`).join('');
    el.querySelectorAll('.niche-tag').forEach(t => {
      t.addEventListener('click', () => { el.querySelectorAll('.niche-tag').forEach(x=>x.classList.remove('active')); t.classList.add('active'); if(navigator.vibrate) navigator.vibrate(10); });
    });
  }
  renderNiches();
  document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => setTimeout(renderNiches, 50)));
});
</script>
</body>

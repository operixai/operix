<head>

<body>
<div id="nav-placeholder"></div>

<header class="page-header">
  <span class="label" data-p="contact_kicker"></span>
  <h1 data-p="contact_h1"></h1>
  <p data-p="contact_sub"></p>
</header>
<section class="clean-wrap">
  <div class="contact-clean-grid">
    <aside class="contact-card anim">
      <span class="clean-kicker" data-p="contact_left_h"></span>
      <p data-p="contact_left_p"></p>
      <ul class="clean-list">
        <li data-p="contact_b1"></li>
        <li data-p="contact_b2"></li>
        <li data-p="contact_b3"></li>
        <li data-p="contact_b4"></li>
        <li data-p="contact_b5"></li>
      </ul>
      <div class="clean-actions">
        <a href="https://t.me/operixai" target="_blank" rel="noopener noreferrer" class="btn btn-ghost">Telegram @operixai</a>
        <a href="https://www.instagram.com/operixagency/" target="_blank" rel="noopener noreferrer" class="btn btn-ghost">Instagram @operixagency</a>
      </div>
    </aside>
    <div class="contact-card anim">
      <h2 style="font-size:clamp(28px,3.2vw,44px)" data-p="contact_form_h"></h2>
      <p data-p="contact_form_p"></p>
      <form id="lead-form" class="contact-form">
        <div class="form-row-clean">
          <div class="form-group-clean"><label class="form-label" data-p="contact_name"></label><input class="form-input" type="text" name="name" required></div>
          <div class="form-group-clean"><label class="form-label" data-p="contact_email"></label><input class="form-input" type="email" name="email" required></div>
        </div>
        <div class="form-row-clean">
          <div class="form-group-clean"><label class="form-label" data-p="contact_company"></label><input class="form-input" type="text" name="company"></div>
          <div class="form-group-clean"><label class="form-label" data-p="contact_budget"></label><select class="form-select" name="budget"><option value="">—</option><option>$300 – $500</option><option>$500 – $1,000</option><option>$1,000 – $3,000</option><option>$3,000+</option></select></div>
        </div>
        <div class="form-group-clean"><label class="form-label" data-p="contact_service"></label><select class="form-select" name="service"><option>AI Customer Support</option><option>Workflow Automation</option><option>AI Lead Generation</option><option>AI Analytics</option><option>AI Content Machine</option><option>Custom AI Agent</option><option>Not sure yet</option></select></div>
        <div class="form-group-clean"><label class="form-label" data-p="contact_message"></label><textarea class="form-textarea" name="message" rows="5" required></textarea></div>
        <button type="submit" class="btn btn-primary btn-lg" id="submit-btn"><svg width="16" height="16"><use href="#i-send"/></svg><span id="submit-text" data-p="contact_send"></span></button>
        <p class="form-hint" data-p="contact_privacy"></p>
      </form>
      <div class="success-state-clean" id="success-state">
        <h3 data-p="contact_success_h"></h3>
        <p data-p="contact_success_p"></p>
      </div>
    </div>
  </div>
</section>
<div id="footer-placeholder"></div>
<script src="js/layout.js?v=20260612-footerpolish1"></script>
<script src="js/main.js?v=11"></script>
<script src="js/page-copy.js?v=20260611-proof1"></script>
<script>
// ── FORM SUBMISSION: Formspree (email) + Google Forms (response database) ──
const FORMSPREE_URL = 'https://formspree.io/f/mwvjowed';
// Hidden Google Form endpoint. Formspree remains the primary email channel.
const GOOGLE_FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSchZEa61OI7zEETBlUXdk-KrpZBlXhiKxxQFIOaEpUJWe0qnA/formResponse';
const GOOGLE_FORM_FIELDS = {
  name: 'entry.2071930142',
  email: 'entry.1650173209',
  company: 'entry.1738699874',
  budget: 'entry.615340276',
  service: 'entry.728902409',
  message: 'entry.1009440002',
  submitted_at: 'entry.868583872',
  page_lang: 'entry.1491191364'
};

document.addEventListener('DOMContentLoaded', () => {
  const form = document.getElementById('lead-form');
  const success = document.getElementById('success-state');
  const submitBtn = document.getElementById('submit-btn');
  const submitTxt = document.getElementById('submit-text');
  if (!form) return;

  form.addEventListener('submit', async e => {
    e.preventDefault();
    const lang = localStorage.getItem('operix_lang') === 'ru' ? 'ru' : 'en';
    const original = submitTxt.textContent;
    submitBtn.disabled = true;
    submitTxt.textContent = lang === 'ru' ? 'Отправляем...' : 'Sending...';
    if (navigator.vibrate) navigator.vibrate([10,40,70]);

    const payload = Object.fromEntries(new FormData(form).entries());
    payload.submitted_at = new Date().toISOString();
    payload.page_lang = lang;

    try {
      // ── Send to Formspree ──
      const res = await fetch(FORMSPREE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error('Formspree failed');

      // ── Send to Google Forms (fire and forget, don't block UX) ──
      if (GOOGLE_FORM_URL) {
        const googleFormData = new URLSearchParams();
        Object.entries(GOOGLE_FORM_FIELDS).forEach(([key, entryId]) => {
          googleFormData.append(entryId, payload[key] || '');
        });
        fetch(GOOGLE_FORM_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: googleFormData
        }).catch(() => {}); // silent fail — Formspree already got it
      }

      // ── Success ──
      form.style.display = 'none';
      success.style.display = 'block';
      if (navigator.vibrate) navigator.vibrate([15,30,15,30,80]);

    } catch (err) {
      submitBtn.disabled = false;
      submitTxt.textContent = original || (lang === 'ru' ? 'Отправить' : 'Send message');
      let error = document.getElementById('form-error');
      if (!error) {
        error = document.createElement('p');
        error.id = 'form-error';
        error.className = 'form-hint';
        error.style.color = '#b91c1c';
        form.appendChild(error);
      }
      error.textContent = lang === 'ru'
        ? 'Ошибка. Напишите нам в Telegram: @operixai'
        : 'Error. Message us on Telegram: @operixai';
    }
  });
});
</script>
<script src="js/video-motion.js?v=20260611-videobadge2"></script>
<script src="js/mobile-smooth.js?v=20260611-mobilefix1"></script>
</body>

<style>
.grid-3, .grid-2, .steps-grid { align-items: start !important; }
.card { height: auto !important; }
.niche-tag{border:1px solid rgba(244,241,237,0.12);padding:10px 20px;border-radius:100px;font-size:13px;color:rgba(244,241,237,0.5);transition:all 0.2s;cursor:pointer}
.niche-tag:hover{border-color:var(--accent);color:var(--accent);background:rgba(232,255,71,0.04)}
.niche-tag.active{border-color:var(--accent);color:var(--accent);background:rgba(232,255,71,0.08);font-weight:600}
.niche-preview-inner{display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:center}
.niche-preview-text h3{font-size:22px;font-weight:700;margin-bottom:12px;color:var(--white)}
.niche-preview-text p{color:rgba(244,241,237,0.6);font-size:15px;line-height:1.65;margin-bottom:20px}
.niche-preview-text ul{list-style:none;padding:0;margin:0 0 24px}
.niche-preview-text ul li{padding:6px 0;color:rgba(244,241,237,0.7);font-size:14px;display:flex;gap:10px;align-items:flex-start}
.niche-preview-text ul li::before{content:"→";color:var(--accent);flex-shrink:0}
.niche-result{background:rgba(232,255,71,0.06);border:1px solid rgba(232,255,71,0.2);border-radius:12px;padding:20px;text-align:center}
.niche-result-num{font-size:36px;font-weight:800;color:var(--accent);line-height:1}
.niche-result-label{font-size:13px;color:rgba(244,241,237,0.5);margin-top:6px}
.niche-preview-results{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:768px){.niche-preview-inner{grid-template-columns:1fr}.niche-preview-results{grid-template-columns:1fr 1fr}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>

  };

  function renderNiches() {
    const l = localStorage.getItem('operix_lang') || 'en';
    const list = data[l] || data.en;
    const el = document.getElementById('niches');
    if (!el) return;
    el.innerHTML = list.map((n,i) => `<span class="niche-tag${i===0?' active':''}" data-idx="${i}">${n.tag}</span>`).join('');
    showPreview(0, l);
    el.querySelectorAll('.niche-tag').forEach(t => {
      t.addEventListener('click', () => {
        el.querySelectorAll('.niche-tag').forEach(x=>x.classList.remove('active'));
        t.classList.add('active');
        if(navigator.vibrate) navigator.vibrate(10);
        showPreview(parseInt(t.dataset.idx), localStorage.getItem('operix_lang')||'en');
      });
    });
  }

  function showPreview(idx, l) {
    const list = data[l] || data.en;
    const item = list[idx];
    if (!item) return;
    const preview = document.getElementById('niche-preview');
    preview.style.display = 'block';
    preview.innerHTML = `
      <div class="niche-preview-inner">
        <div class="niche-preview-text">
          <h3>${item.title}</h3>
          <p>${item.desc}</p>
          <ul>${item.items.map(i=>`<li>${i}</li>`).join('')}</ul>
          <a href="contact.html" class="btn btn-primary">${l==='ru'?'Обсудить проект →':'Start a Project →'}</a>
        </div>
        <div class="niche-preview-results">
          ${item.results.map(r=>`<div class="niche-result"><div class="niche-result-num">${r.n}</div><div class="niche-result-label">${r.l}</div></div>`).join('')}
        </div>
      </div>`;
  }

  renderNiches();
  document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => setTimeout(renderNiches, 50)));
});
</script>
</body>
</html>
